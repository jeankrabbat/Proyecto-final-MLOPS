name: CI and CD data model

on:
  push:
    branches: [develop]
  pull_request:
    branches: [staging]

jobs:
  retraining_ai_model:
    runs-on: ubuntu-latest
    container: docker://dvcorg/cml:latest
    steps:
      - uses: actions/checkout@v2

      - name: Setup Python and cache
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Execute the training model
        run: python3 retraining.py

      - name: Generating report
        run: |
          echo "## Model metrics" > report.md
          cat metrics.txt >> report.md
          echo "## Data visualization" >> report.md
          cml-publish model/autots_predictions.png --md >> report.md
          cml-send-comment report.md

  build_docker_image:
    needs: retraining_ai_model
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push image
        run: |
          docker build --no-cache -t jeanrabbat/deploy_pax_forecast:dev .
          docker push jeanrabbat/deploy_pax_forecast:dev
