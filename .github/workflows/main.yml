name: CI and CD data model

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - staging

jobs:
  retraining_ai_model:
    runs-on: ubuntu-latest
    container: docker://dvcorg/cml:latest
    env:
      repo_token: ${{ secrets.GITHUBTOKEN }}
    steps:
      - uses: actions/checkout@v2

      - name: Upgrade pip
        run: pip install --upgrade pip

      - name: Install requirements
        run: pip install --no-cache-dir -r requirements.txt

      - name: Execute the training model
        run: python3 retraining.py

      - name: Generating report
        run: |
          echo "## Model metrics" > report.md
          cat metrics.txt >> report.md
          
          echo "## Data visualization" >> report.md
          cml-publish model/autots_predictions.png --md >> report.md
          
          cml-send-comment report.md

  build_docker_image:
    needs: retraining_ai_model
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2

      - name: Login to dockerhub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build docker image
        run: docker build -t jeanrabbat/deploy_pax_forecast:dev .

      - name: Docker push to Dockerhub
        run: docker push jeanrabbat/deploy_pax_forecast:dev

      
      - name: Login into the docker hub
        run: echo '${{ secrets.DOCKER_PASSWORD }}' | docker login -u '${{ secrets.DOCKER_USERNAME }}' --password-stdin

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          script: |
            docker login -u '${{ secrets.DOCKER_USERNAME }}' -p '${{ secrets.DOCKER_PASSWORD }}'
            if docker ps --all | grep pax_forecast; then
              docker stop pax_forecast
              docker rm pax_forecast
            fi
            
            docker pull ${{ secrets.DOCKER_USERNAME }}/deploy_pax_forecast:dev
            docker run -d --name pax_forecast -p 8501:8501 ${{ secrets.DOCKER_USERNAME }}/deploy_pax_forecast:dev